# ClamAV configuration for AmmanGate Docker

# Log files
LogFile /var/log/clamav/clamd.log
LogTime yes
LogFileMaxSize 10M
LogRotate yes
LogSyslog yes

# Database directory
DatabaseDirectory /var/lib/clamav
OfficialDatabaseOnly yes

# TCP settings
TCPSocket 3310
TCPAddr 127.0.0.1
MaxThreads 10
MaxConnectionQueueLength 15

# Scanning options
ScanMail yes
ScanPDF yes
ScanArchive yes
ScanRAR yes
ScanOLE2 yes
ScanHTML yes
ScanPE yes
ScanELF yes
DetectPUA yes
ScanPartialMessages yes

# Performance settings
MaxScanSize 100M
MaxFileSize 25M
MaxRecursion 10
MaxFiles 10000

# Security settings
User clamav
AllowSupplementaryGroups yes
Foreground yes
Debug yes
