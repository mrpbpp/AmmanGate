version: "3.9"

services:
  # Go Backend - Bodyguard Core API
  bodyguard-core:
    build:
      context: ../apps/bodyguard-core
      dockerfile: ../../deploy/Dockerfile.core
    container_name: ammangate-core
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - bodyguard-data:/app/data
    environment:
      - BG_ADDR=0.0.0.0:8787
      - BG_DB=/app/data/bodyguard.db
      - BG_ACTION_PIN=${ACTION_PIN:-1234}
      - BG_ADMIN_USER=${BG_ADMIN_USER:-admin}
      - BG_ADMIN_PASS=${BG_ADMIN_PASS:-admin123}
      - BG_EXEC_MODE=${BG_EXEC_MODE:-log}
      - BG_SCAN_MODE=${BG_SCAN_MODE:-fast}
      - BG_WS_ALLOWED_ORIGINS=${BG_WS_ALLOWED_ORIGINS:-http://localhost:3000}
      - BG_MIGRATIONS=/app/migrations
    networks:
      - ammangate-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8787/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js Dashboard UI
  bodyguard-ui:
    build:
      context: ../apps/bodyguard-ui
      dockerfile: ../../deploy/Dockerfile.ui
    container_name: ammangate-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CORE_API_URL=http://bodyguard-core:8787
      - BG_UI_SECRET=${BG_UI_SECRET:-change_me_in_production}
      - NODE_ENV=production
    depends_on:
      bodyguard-core:
        condition: service_healthy
    networks:
      - ammangate-internal

  # Clawbot - AI Agent Service
  clawbot:
    image: clawbot/clawbot:latest
    container_name: ammangate-clawbot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - clawbot-data:/app/data
      - clawbot-logs:/app/logs
      - ../apps/clawbot/config:/app/config:ro
    environment:
      - CLAWBOT_API_KEY=${CLAWBOT_API_KEY}
      - CLAWBOT_WEBHOOK_SECRET=${CLAWBOT_WEBHOOK_SECRET}
      - CLAWBOT_CONFIG=/app/config/clawbot.yaml
    networks:
      - ammangate-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Claw Gateway - Bridges Clawbot and Bodyguard Core
  claw-gateway:
    build:
      context: ../apps/claw-gateway
      dockerfile: ../../deploy/Dockerfile.claw
    container_name: ammangate-claw-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - CORE_API_URL=http://bodyguard-core:8787
      - CLAW_PORT=3001
      - ACTION_PIN=${ACTION_PIN:-1234}
      - CLAWBOT_API_URL=http://clawbot:8080
      - CLAWBOT_API_KEY=${CLAWBOT_API_KEY}
      - CLAWBOT_WEBHOOK_SECRET=${CLAWBOT_WEBHOOK_SECRET}
    depends_on:
      bodyguard-core:
        condition: service_healthy
      clawbot:
        condition: service_healthy
    networks:
      - ammangate-internal

  # Reverse Proxy (Caddy) - Optional
  caddy:
    image: caddy:2-alpine
    container_name: ammangate-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - bodyguard-ui
    networks:
      - ammangate-internal
      - ammangate-external

volumes:
  bodyguard-data:
    driver: local
  clawbot-data:
    driver: local
  clawbot-logs:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  ammangate-internal:
    driver: bridge
    internal: true
  ammangate-external:
    driver: bridge
